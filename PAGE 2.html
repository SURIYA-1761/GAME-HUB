<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Enhanced Snake Game</title>

<style>
body {
    margin: 0;
    padding: 20px;
    background: linear-gradient(135deg, #0a0a0a, #1a1a2e);
    color: #0f0;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
}

canvas {
    border: 3px solid #00ff41;
    background: radial-gradient(circle, #000 0%, #001100 100%);
    box-shadow: 0 0 50px rgba(0,255,65,0.5);
    border-radius: 10px;
}

.score {
    font-size: 28px;
    font-weight: bold;
    text-shadow: 0 0 10px #0f0;
    margin-bottom: 10px;
}

button {
    background: #00ff41;
    color: black;
    border: none;
    padding: 10px 18px;
    margin: 5px;
    border-radius: 20px;
    cursor: pointer;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="score">Score: <span id="score">0</span></div>
<canvas id="canvas" width="400" height="400"></canvas>

<div>
<button onclick="init()">Restart</button>
<button onclick="setDifficulty('easy')">Easy</button>
<button onclick="setDifficulty('normal')">Normal</button>
<button onclick="setDifficulty('hard')">Hard</button>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreElement = document.getElementById('score');

const gridSize = 20;
const tileCount = canvas.width / gridSize;

let snake;
let food;
let dx;
let dy;
let score;
let gameRunning;
let particles = [];
let time = 0;

// ===== SPEED CONTROL =====
let baseSpeed = 180;  // starting speed
let moveInterval = baseSpeed;
let lastMoveTime = 0;
let turbo = false;

// ===== INIT =====
function init() {
    snake = [{x: 10, y: 10}];
    dx = 0;
    dy = 0;
    score = 0;
    gameRunning = true;
    particles = [];
    scoreElement.textContent = score;
    moveInterval = baseSpeed;
    generateFood();
}

function setDifficulty(level) {
    if (level === 'easy') baseSpeed = 220;
    if (level === 'normal') baseSpeed = 180;
    if (level === 'hard') baseSpeed = 120;
    moveInterval = baseSpeed;
}

// ===== FOOD =====
function generateFood() {
    food = {
        x: Math.floor(Math.random() * tileCount),
        y: Math.floor(Math.random() * tileCount)
    };
}

// ===== PARTICLES =====
function createParticles(x, y) {
    for (let i = 0; i < 10; i++) {
        particles.push({
            x: x * gridSize + gridSize / 2,
            y: y * gridSize + gridSize / 2,
            vx: (Math.random() - 0.5) * 8,
            vy: (Math.random() - 0.5) * 8,
            life: 1,
            size: Math.random() * 4 + 2
        });
    }
}

function updateParticles() {
    particles = particles.filter(p => {
        p.x += p.vx;
        p.y += p.vy;
        p.life -= 0.05;
        return p.life > 0;
    });
}

function drawParticles() {
    particles.forEach(p => {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = "orange";
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
    });
}

// ===== DRAW =====
function drawSnake() {
    snake.forEach((segment, index) => {
        ctx.shadowColor = index === 0 ? '#00ff88' : '#00aa44';
        ctx.shadowBlur = 15;
        ctx.fillStyle = index === 0 ? '#00ff88' : '#00aa44';
        ctx.fillRect(segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2);
        ctx.shadowBlur = 0;
    });
}

function drawFood() {
    ctx.shadowColor = '#ff0000';
    ctx.shadowBlur = 20;
    ctx.fillStyle = 'red';
    ctx.fillRect(food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2);
    ctx.shadowBlur = 0;
}

function drawGame() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawFood();
    drawSnake();
    drawParticles();
    updateParticles();

    const currentTime = Date.now();
    let currentSpeed = turbo ? 60 : moveInterval;

    if (currentTime - lastMoveTime > currentSpeed) {
        lastMoveTime = currentTime;

        const head = {x: snake[0].x + dx, y: snake[0].y + dy};

        // Wall wrap
        if (head.x < 0) head.x = tileCount - 1;
        if (head.x >= tileCount) head.x = 0;
        if (head.y < 0) head.y = tileCount - 1;
        if (head.y >= tileCount) head.y = 0;

        snake.unshift(head);

        if (head.x === food.x && head.y === food.y) {
            score++;
            scoreElement.textContent = score;
            generateFood();
            createParticles(food.x, food.y);

            // Increase speed every 5 points
            if (score % 5 === 0 && moveInterval > 60) {
                moveInterval -= 10;
            }
        } else {
            snake.pop();
        }

        // Self collision
        if (snake.slice(1).some(segment => segment.x === head.x && segment.y === head.y)) {
            gameRunning = false;
            alert("Game Over! Score: " + score);
        }
    }
}

// ===== CONTROLS =====
document.addEventListener('keydown', e => {
    if (!gameRunning) return;

    if (e.key === 'Shift') turbo = true;

    switch(e.key) {
        case 'ArrowLeft': if (dx !== 1) { dx = -1; dy = 0; } break;
        case 'ArrowUp': if (dy !== 1) { dx = 0; dy = -1; } break;
        case 'ArrowRight': if (dx !== -1) { dx = 1; dy = 0; } break;
        case 'ArrowDown': if (dy !== -1) { dx = 0; dy = 1; } break;
    }
});

document.addEventListener('keyup', e => {
    if (e.key === 'Shift') turbo = false;
});

// ===== LOOP =====
function gameLoop() {
    if (gameRunning) drawGame();
    requestAnimationFrame(gameLoop);
}

init();
gameLoop();
</script>

</body>
</html>
