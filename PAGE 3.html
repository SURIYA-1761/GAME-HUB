<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Alien Shooter - POWER-UPS!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at center, #001122 0%, #000000 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            color: #0ff;
        }
        #ui {
            margin: 10px 0;
            font-size: 20px;
            text-shadow: 0 0 10px #0ff;
            display: flex;
            gap: 20px;
            align-items: center;
            flex-wrap: wrap;
        }
        canvas {
            border: 3px solid #0ff;
            box-shadow: 0 0 30px #0ff;
            background: #000;
        }
        .btn {
            padding: 12px 24px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            background: linear-gradient(45deg, #0ff, #00f);
            color: #000;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 0 20px #0ff;
            transition: all 0.3s;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn:hover {
            background: linear-gradient(45deg, #fff, #0ff);
            box-shadow: 0 0 30px #fff;
            transform: scale(1.05);
        }
        .btn:active {
            transform: scale(0.95);
        }
        #instructions {
            margin-top: 10px;
            font-size: 14px;
            text-align: center;
            opacity: 0.8;
        }
        #levelDisplay {
            font-size: 18px;
            margin-left: 10px;
        }
        .powerup-active {
            animation: pulse 1s infinite;
            text-shadow: 0 0 20px #ff0 !important;
        }
    </style>
</head>
<body>
    <div id="ui">
        <span id="score">Score: 0</span> | 
        <span id="lives">Lives: 3</span> |
        <span id="levelDisplay">Level: 1</span> |
        <span id="powerupDisplay">🔹 No Power</span>
        <button class="btn" id="restartBtn" onclick="restartGame()">🔄 Restart</button>
        <button class="btn" id="levelBtn" onclick="nextLevel()">🚀 Next Level</button>
    </div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>
    <div id="instructions">
        ← → Arrow Keys | SPACEBAR Shoot | 🟡 TRIPLE SHOT | 🔴 RAPID FIRE | Grab falling power-ups!
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingEnabled = false;

        // Game state
        let gameState = {
            score: 0,
            lives: 3,
            level: 1,
            running: true,
            keys: {},
            lastShoot: 0,
            powerup: null, // 'triple', 'rapidfire'
            powerupTimer: 0
        };

        // Player ship
        const player = {
            x: 375,
            y: 500,
            width: 50,
            height: 40,
            speed: 6
        };

        // Game arrays
        let bullets = [];
        let aliens = [];
        let powerups = []; // NEW!
        let stars = [];
        let frameCount = 0;

        // Initialize stars
        for(let i = 0; i < 80; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 1.5 + 0.5,
                speed: Math.random() * 1 + 0.3
            });
        }

        // Input handling
        document.addEventListener('keydown', (e) => {
            gameState.keys[e.code] = true;
            if(e.code === 'Space') e.preventDefault();
        });
        document.addEventListener('keyup', (e) => {
            gameState.keys[e.code] = false;
        });

        // Bullet class
        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 3;
                this.height = 10;
                this.speed = 10;
            }
            update() {
                this.y -= this.speed;
            }
            draw() {
                ctx.fillStyle = '#00ffff';
                ctx.shadowColor = '#00ffff';
                ctx.shadowBlur = 15;
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }
        }

        // Alien class
        class Alien {
            constructor() {
                this.x = Math.random() * (canvas.width - 45);
                this.y = -50;
                this.width = 45;
                this.height = 35;
                this.speed = 1.5 + Math.random() * 1 + (gameState.level * 0.3);
                this.wiggle = 0;
            }
            update() {
                this.y += this.speed;
                this.x += Math.sin(this.wiggle) * 0.5;
                this.wiggle += 0.2;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + 22, this.y + 17);
                
                ctx.fillStyle = gameState.level >= 3 ? '#ff6b6b' : '#4ade80';
                ctx.shadowColor = ctx.fillStyle;
                ctx.shadowBlur = 8;
                
                ctx.fillRect(-15, 0, 30, 25);
                ctx.fillRect(-10, -15, 20, 15);
                
                ctx.fillStyle = '#ffffff';
                ctx.fillRect(-8, -12, 5, 5);
                ctx.fillRect(3, -12, 5, 5);
                ctx.fillStyle = '#0000ff';
                ctx.fillRect(-7, -11, 3, 3);
                ctx.fillRect(4, -11, 3, 3);
                
                ctx.strokeStyle = '#22c55e';
                ctx.lineWidth = 2;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(-12, -15);
                ctx.lineTo(-18, -25);
                ctx.moveTo(12, -15);
                ctx.lineTo(18, -25);
                ctx.stroke();
                
                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        // POWERUP CLASS - NEW!
        class Powerup {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.width = 30;
                this.height = 30;
                this.type = type; // 'triple' or 'rapidfire'
                this.speed = 2;
                this.rotation = 0;
            }
            update() {
                this.y += this.speed;
                this.rotation += 0.1;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x + 15, this.y + 15);
                ctx.rotate(this.rotation);
                
                if(this.type === 'triple') {
                    // Yellow triple shot
                    ctx.fillStyle = '#ffd700';
                    ctx.shadowColor = '#ffd700';
                    ctx.shadowBlur = 20;
                    ctx.fillRect(-12, -12, 24, 24);
                    ctx.fillStyle = '#ffed4a';
                    ctx.font = '16px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('3X', 0, 0);
                } else {
                    // Red rapid fire
                    ctx.fillStyle = '#ff4444';
                    ctx.shadowColor = '#ff4444';
                    ctx.shadowBlur = 20;
                    ctx.fillRect(-12, -12, 24, 24);
                    ctx.fillStyle = '#ff6666';
                    ctx.font = '14px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('RF', 0, 3);
                }
                ctx.restore();
                ctx.shadowBlur = 0;
            }
        }

        function shoot() {
            const now = Date.now();
            let shootDelay = 150;
            
            if(gameState.powerup === 'rapidfire') {
                shootDelay = 80; // Faster shooting
            }
            
            if(now - gameState.lastShoot > shootDelay) {
                if(gameState.powerup === 'triple') {
                    // Triple shot
                    bullets.push(new Bullet(player.x + player.width/2 - 1.5, player.y));
                    bullets.push(new Bullet(player.x + player.width/2 - 15, player.y + 10));
                    bullets.push(new Bullet(player.x + player.width/2 + 12, player.y + 10));
                } else {
                    // Normal shot
                    bullets.push(new Bullet(player.x + player.width/2 - 1.5, player.y));
                }
                gameState.lastShoot = now;
            }
        }

        function spawnAlien() {
            const spawnRate = Math.max(60 - (gameState.level * 8), 30);
            if(frameCount % spawnRate === 0) {
                aliens.push(new Alien());
            }
        }

        // NEW: Spawn powerups randomly
        function spawnPowerup() {
            if(frameCount % 300 === 0 && Math.random() < 0.4) { // 40% chance every 5 sec
                const types = ['triple', 'rapidfire'];
                const type = types[Math.floor(Math.random() * types.length)];
                powerups.push(new Powerup(
                    Math.random() * (canvas.width - 30), 
                    -30, 
                    type
                ));
            }
        }

        function checkCollisions() {
            // Bullet vs Alien
            for(let b = bullets.length - 1; b >= 0; b--) {
                for(let a = aliens.length - 1; a >= 0; a--) {
                    const bullet = bullets[b];
                    const alien = aliens[a];
                    
                    if(bullet.x < alien.x + alien.width &&
                       bullet.x + bullet.width > alien.x &&
                       bullet.y < alien.y + alien.height &&
                       bullet.y + bullet.height > alien.y) {
                        aliens.splice(a, 1);
                        bullets.splice(b, 1);
                        
                        // 10% chance to drop powerup
                        if(Math.random() < 0.1) {
                            const types = ['triple', 'rapidfire'];
                            const type = types[Math.floor(Math.random() * types.length)];
                            powerups.push(new Powerup(alien.x + 7, alien.y + 17, type));
                        }
                        
                        gameState.score += 10 * gameState.level;
                        updateUI();
                        return;
                    }
                }
            }
            
            // NEW: Player vs Powerup
            for(let p = powerups.length - 1; p >= 0; p--) {
                const powerup = powerups[p];
                if(player.x < powerup.x + powerup.width &&
                   player.x + player.width > powerup.x &&
                   player.y < powerup.y + powerup.height &&
                   player.y + player.height > powerup.y) {
                    powerups.splice(p, 1);
                    gameState.powerup = powerup.type;
                    gameState.powerupTimer = 600; // 10 seconds
                    updateUI();
                    return;
                }
            }
            
            // Alien vs Player
            for(let a = aliens.length - 1; a >= 0; a--) {
                const alien = aliens[a];
                if(player.x < alien.x + alien.width &&
                   player.x + player.width > alien.x &&
                   player.y < alien.y + alien.height &&
                   player.y + player.height > alien.y) {
                    aliens.splice(a, 1);
                    gameState.lives--;
                    updateUI();
                    if(gameState.lives <= 0) {
                        gameState.running = false;
                    }
                    return;
                }
            }
        }

        function updateUI() {
            document.getElementById('score').textContent = `Score: ${gameState.score}`;
            document.getElementById('lives').textContent = `Lives: ${gameState.lives}`;
            document.getElementById('levelDisplay').textContent = `Level: ${gameState.level}`;
            
            // Powerup display
            if(gameState.powerup) {
                const powerupText = gameState.powerup === 'triple' ? '🔹 TRIPLE SHOT' : '🔥 RAPID FIRE';
                document.getElementById('powerupDisplay').textContent = powerupText;
                document.getElementById('powerupDisplay').classList.add('powerup-active');
            } else {
                document.getElementById('powerupDisplay').textContent = '🔹 No Power';
                document.getElementById('powerupDisplay').classList.remove('powerup-active');
            }
        }

        function restartGame() {
            gameState = {
                score: 0,
                lives: 3,
                level: 1,
                running: true,
                keys: {},
                lastShoot: 0,
                powerup: null,
                powerupTimer: 0
            };
            player.x = 375;
            bullets = [];
            aliens = [];
            powerups = [];
            frameCount = 0;
            updateUI();
        }

        function nextLevel() {
            if(gameState.running) {
                gameState.level++;
                gameState.lives = 3;
                bullets = [];
                aliens = [];
                powerups = [];
                player.x = 375;
                frameCount = 0;
                updateUI();
            }
        }

        function update() {
            if(!gameState.running) {
                document.getElementById('restartBtn').style.display = 'inline-block';
                document.getElementById('levelBtn').style.display = 'none';
                return;
            }
            
            frameCount++;
            
            // Powerup timer
            if(gameState.powerup && gameState.powerupTimer > 0) {
                gameState.powerupTimer--;
                if(gameState.powerupTimer <= 0) {
                    gameState.powerup = null;
                }
            }
            
            // Player movement
            if(gameState.keys['ArrowLeft'] && player.x > 0) {
                player.x -= player.speed;
            }
            if(gameState.keys['ArrowRight'] && player.x < canvas.width - player.width) {
                player.x += player.speed;
            }
            if(gameState.keys['Space']) {
                shoot();
            }
            
            // Update game objects
            bullets = bullets.filter(b => {
                b.update();
                return b.y > -b.height;
            });
            
            aliens.forEach(alien => alien.update());
            aliens = aliens.filter(alien => alien.y < canvas.height + 50);
            
            powerups.forEach(powerup => powerup.update());
            powerups = powerups.filter(powerup => powerup.y < canvas.height + 50);
            
            spawnAlien();
            spawnPowerup();
            checkCollisions();
            
            updateUI();
        }

        function drawPlayer() {
            ctx.save();
            ctx.translate(player.x + 25, player.y + 20);
            
            ctx.fillStyle = '#9ca3af';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 12;
            ctx.fillRect(-20, 5, 40, 25);
            ctx.fillRect(-25, 15, 15, 12);
            ctx.fillRect(10, 15, 15, 12);
            
            ctx.fillStyle = '#00ffff';
            ctx.fillRect(-12, -5, 24, 12);
            
            // Powerup glow effect
            if(gameState.powerup) {
                ctx.shadowColor = gameState.powerup === 'triple' ? '#ffd700' : '#ff4444';
                ctx.shadowBlur = 25;
            }
            
            const gradient = ctx.createRadialGradient(0, 35, 0, 0, 35, 15);
            gradient.addColorStop(0, '#ff00ff');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(-8, 25, 16, 20);
            
            ctx.restore();
            ctx.shadowBlur = 0;
        }

        function draw() {
            ctx.fillStyle = '#000011';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Stars
            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                star.y += star.speed;
                if(star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
            });
            
            drawPlayer();
            bullets.forEach(bullet => bullet.draw());
            aliens.forEach(alien => alien.draw());
            powerups.forEach(powerup => powerup.draw()); // NEW!
            
            if(!gameState.running) {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ff0000';
                ctx.font = '48px Courier New';
                ctx.textAlign = 'center';
                ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2);
                ctx.font = '24px Courier New';
                ctx.fillStyle = '#00ffff';
                ctx.fillText(`Final Score: ${gameState.score}`, canvas.width/2, canvas.height/2 + 60);
                ctx.fillText(`Level Reached: ${gameState.level}`, canvas.width/2, canvas.height/2 + 90);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        updateUI();
        gameLoop();
    </script>
</body>
</html>
